<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Gastos</title>
    <script>
      // Applies a saved manual theme before first paint to avoid a flash of the wrong theme.
      // Wrapped in try/catch: localStorage can throw (private mode, blocked storage) and
      // must never break app mount — falls back to following the system theme.
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored
          }
        } catch (e) {
          // Storage unavailable: keep following prefers-color-scheme.
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
