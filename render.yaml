services:
  - type: web
    name: gestor-gastos-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__Default
        sync: false
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: GestorGastos
      - key: Jwt__Audience
        value: GestorGastos
      - key: Jwt__ExpiryMinutes
        value: "15"
      # 32-byte base64 key to encrypt TOTP secrets at rest. Set manually
      # (e.g. `openssl rand -base64 32`); must stay stable across deploys.
      - key: Totp__EncryptionKey
        sync: false

  - type: web
    name: gestor-gastos-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://gestor-gastos-api-jksn.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
